<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdSafe+ | AI Event Intelligence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map { height: 400px; border-radius: 1.5rem; z-index: 10; border: 1px solid #1e293b; }
        
        .cctv-grid {
            background: #000;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .alert-pulse {
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
            70% { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body>

    <!-- SECTION: SETUP -->
    <div id="setup-view" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-6xl shadow-2xl grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="flex flex-col justify-center">
                <div class="flex items-center gap-4 mb-8">
                    <div class="bg-sky-500 p-4 rounded-3xl shadow-lg shadow-sky-500/30">
                        <i class="ph-bold ph-shield-check text-4xl text-white"></i>
                    </div>
                    <h1 class="text-5xl font-black tracking-tighter">CrowdSafe+</h1>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">Event Name</label>
                        <input type="text" id="event-input" placeholder="e.g. Madurai Chithirai Festival" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-6 py-4 text-white outline-none focus:border-sky-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">Deployment Type</label>
                        <select id="type-input" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-6 py-4 text-white outline-none cursor-pointer">
                            <option value="Festival">Public Festival</option>
                            <option value="Concert">Music Concert</option>
                            <option value="Religious">Religious Pilgrimage</option>
                            <option value="Sports">Sports Stadium</option>
                        </select>
                    </div>
                    <button onclick="launchDashboard()" class="w-full py-5 rounded-2xl font-black text-lg bg-sky-600 hover:bg-sky-500 transition-all shadow-xl shadow-sky-900/20 flex items-center justify-center gap-3">
                        <i class="ph-bold ph-radar text-2xl"></i> INITIALIZE GRID
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 mb-3 uppercase tracking-widest text-center">Set Center Coordinates</label>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- SECTION: DASHBOARD -->
    <div id="dashboard-view" class="hidden min-h-screen">
        <header class="glass sticky top-0 z-50 px-8 py-4 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <i class="ph-fill ph-shield-check text-3xl text-sky-500"></i>
                <div>
                    <h2 id="dash-event-name" class="text-xl font-black">EVENT HQ</h2>
                    <p id="dash-meta" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest tracking-widest">Live Monitoring Active</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 flex items-center gap-3">
                    <i class="ph-bold ph-translate text-sky-400"></i>
                    <select id="lang-select" class="bg-transparent border-none text-xs font-black text-white outline-none cursor-pointer uppercase">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी (Hindi)</option>
                        <option value="ta">தமிழ் (Tamil)</option>
                        <option value="te">తెలుగు (Telugu)</option>
                        <option value="kn">ಕನ್ನಡ (Kannada)</option>
                        <option value="ml">മലയാളം (Malayalam)</option>
                    </select>
                </div>
                <button onclick="location.reload()" class="p-3 rounded-xl bg-slate-800 text-slate-400 hover:text-white transition-all">
                    <i class="ph-bold ph-arrow-counter-clockwise text-xl"></i>
                </button>
            </div>
        </header>

        <main class="max-w-[1600px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Analytics Column -->
            <div class="lg:col-span-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-8 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-500 tracking-widest mb-2 uppercase">Headcount</p>
                        <h3 id="stat-count" class="text-5xl font-black text-sky-400">0</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-500 tracking-widest mb-2 uppercase">Risk Zone</p>
                        <h3 id="stat-hotspot" class="text-5xl font-black text-orange-500">--</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-500 tracking-widest mb-2 uppercase">Risk Level</p>
                        <h3 id="stat-risk" class="text-5xl font-black text-emerald-500">STABLE</h3>
                    </div>
                </div>

                <div class="bg-sky-500/10 border-2 border-sky-500/30 p-8 rounded-[2rem] flex flex-col md:flex-row items-center gap-8">
                    <div class="w-20 h-20 bg-sky-500 rounded-3xl flex items-center justify-center shadow-lg shadow-sky-500/40 shrink-0">
                        <i class="ph-fill ph-cpu text-4xl text-white"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-sky-400 tracking-widest uppercase mb-1">AI Rerouting Engine</p>
                        <h4 id="ai-suggestion" class="text-2xl font-bold text-slate-100 italic">Calculating optimal foot traffic...</h4>
                    </div>
                </div>

                <div id="zone-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <!-- Control Column -->
            <div class="lg:col-span-4 space-y-8">
                <!-- PA System -->
                <div class="glass p-10 rounded-[2.5rem] text-center border-b-8 border-yellow-500/30">
                    <div id="pa-icon" class="w-24 h-24 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="ph-fill ph-megaphone text-5xl text-yellow-500"></i>
                    </div>
                    <h5 class="text-2xl font-black mb-2">PA Command</h5>
                    <p class="text-sm text-slate-400 mb-8 px-4">Broadcast AI safety directions to the entire venue instantly.</p>
                    <button id="broadcast-btn" onclick="triggerPA()" class="w-full py-5 rounded-2xl font-black text-white bg-yellow-600 hover:bg-yellow-500 transition-all shadow-xl shadow-yellow-900/30 flex items-center justify-center gap-3">
                        <i class="ph-bold ph-broadcast text-2xl"></i> BROADCAST NOW
                    </button>
                </div>

                <!-- CCTV -->
                <div class="glass p-6 rounded-[2rem]">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h5 class="font-black text-xs uppercase tracking-widest text-slate-500">Live CCTV</h5>
                        <span class="flex items-center gap-2 text-[10px] font-black text-red-500"><span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> LIVE</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="cctv-grid aspect-video rounded-xl border border-slate-800 flex items-center justify-center"><span class="text-[9px] font-mono text-slate-700 uppercase">North_Cam</span></div>
                        <div class="cctv-grid aspect-video rounded-xl border border-slate-800 flex items-center justify-center"><span class="text-[9px] font-mono text-slate-700 uppercase">South_Cam</span></div>
                        <div class="cctv-grid aspect-video rounded-xl border border-slate-800 flex items-center justify-center"><span class="text-[9px] font-mono text-slate-700 uppercase">East_Cam</span></div>
                        <div class="cctv-grid aspect-video rounded-xl border border-slate-800 flex items-center justify-center"><span class="text-[9px] font-mono text-slate-700 uppercase">West_Cam</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let map, marker, currentLang = 'en', ttsMsg = "";
        const zones = {
            "North": { cap: 1200, occ: 400 },
            "South": { cap: 1000, occ: 850 },
            "East": { cap: 2000, occ: 600 },
            "West": { cap: 800, occ: 200 }
        };

        const i18n = {
            "en": { "att": "Attention please.", "opt": "Crowd flow is currently optimal. Stay safe.", "rer": "Crowd is high at {from}. Move to {to} immediately.", "z": { "North": "North", "South": "South", "East": "East", "West": "West" } },
            "hi": { "att": "कृपया ध्यान दें।", "opt": "भीड़ का वितरण अभी सामान्य है। सुरक्षित रहें।", "rer": "{from} क्षेत्र में भीड़ अधिक है। कृपया तुरंत {to} की ओर बढ़ें।", "z": { "North": "उत्तर", "South": "दक्षिण", "East": "पूर्व", "West": "पश्चिम" } },
            "ta": { "att": "கவனிக்கவும்.", "opt": "கூட்டம் தற்போது சீராக உள்ளது. பாதுகாப்பாக இருங்கள்.", "rer": "{from} பகுதியில் கூட்டம் அதிகம். தயவுசெய்து {to} பகுதிக்கு செல்லவும்.", "z": { "North": "வடக்கு", "South": "தெற்கு", "East": "கிழக்கு", "West": "மேற்கு" } },
            "te": { "att": "దయచేసి గమనించండి.", "opt": "రద్దీ ప్రస్తుతం సాధారణంగా ఉంది. సురక్షితంగా ఉండండి.", "rer": "{from} వద్ద రద్దీ ఎక్కువగా ఉంది. దయచేసి {to} కు వెళ్లండి.", "z": { "North": "ఉత్తర", "South": "దక్షిణ", "East": "తూర్పు", "West": "పశ్చిమ" } },
            "kn": { "att": "ದಯವಿಟ್ಟು ಗಮನಿಸಿ.", "opt": "ಜನದಟ್ಟಣೆ ಪ್ರಸ್ತುತ ಸಾಮಾನ್ಯವಾಗಿದೆ. ಸುರಕ್ಷಿತವಾಗಿರಿ.", "rer": "{from} ನಲ್ಲಿ ಜನದಟ್ಟಣೆ ಹೆಚ್ಚಾಗಿದೆ. ದಯವಿಟ್ಟು {to} ಗೆ ತೆರಳಿ.", "z": { "North": "ಉತ್ತರ", "South": "ದಕ್ಷಿಣ", "East": "ಪೂರ್ವ", "West": "ಪಶ್ಚಿಮ" } },
            "ml": { "att": "ശ്രദ്ധിക്കുക.", "opt": "ജനത്തിരക്ക് നിലവിൽ സാധാരണമാണ്. സുരക്ഷിതരായിരിക്കുക.", "rer": "{from} മേഖലയിൽ തിരക്ക് കൂടുതലാണ്. {to} ഭാഗത്തേക്ക് മാറുക.", "z": { "North": "വടക്ക്", "South": "തെക്ക്", "East": "കിഴക്ക്", "West": "പടിഞ്ഞാറ്" } }
        };

        window.onload = () => {
            map = L.map('map').setView([9.9252, 78.1198], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            marker = L.marker([9.9252, 78.1198], {draggable: true}).addTo(map);
        };

        function launchDashboard() {
            const name = document.getElementById('event-input').value || "Unnamed Event";
            const type = document.getElementById('type-input').value;
            document.getElementById('dash-event-name').innerText = name.toUpperCase();
            document.getElementById('dash-meta').innerText = `LIVE • ${type} • SECURE`;
            
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            
            updateLoop();
            setInterval(updateLoop, 4000);
        }

        function updateLoop() {
            let total = 0, highest = 0, hotZone = "", coldZone = "", minPct = 101;
            Object.keys(zones).forEach(z => {
                const change = Math.floor(Math.random() * 120) - 50;
                zones[z].occ = Math.max(100, Math.min(zones[z].cap, zones[key = z].occ + change));
                const pct = (zones[z].occ / zones[z].cap) * 100;
                total += zones[z].occ;
                if(pct > highest) { highest = pct; hotZone = z; }
                if(pct < minPct) { minPct = pct; coldZone = z; }
            });

            document.getElementById('stat-count').innerText = total.toLocaleString();
            document.getElementById('stat-hotspot').innerText = hotZone.toUpperCase();
            
            const risk = document.getElementById('stat-risk');
            if(highest > 85) { risk.innerText = "CRITICAL"; risk.className = "text-5xl font-black text-red-500"; }
            else if(highest > 65) { risk.innerText = "WARNING"; risk.className = "text-5xl font-black text-orange-500"; }
            else { risk.innerText = "STABLE"; risk.className = "text-5xl font-black text-emerald-500"; }

            currentLang = document.getElementById('lang-select').value;
            const dict = i18n[currentLang];
            
            if(highest > 70) {
                document.getElementById('ai-suggestion').innerText = `Strategic Reroute: Move crowd from ${hotZone} to ${coldZone}.`;
                ttsMsg = dict.att + " " + dict.rer.replace('{from}', dict.z[hotZone]).replace('{to}', dict.z[coldZone]);
            } else {
                document.getElementById('ai-suggestion').innerText = "Flow is currently optimal. No intervention required.";
                ttsMsg = dict.att + " " + dict.opt;
            }
            renderZones();
        }

        function renderZones() {
            const grid = document.getElementById('zone-grid');
            grid.innerHTML = Object.keys(zones).map(z => {
                const pct = (zones[z].occ / zones[z].cap) * 100;
                const isCrit = pct > 85;
                const colorClass = isCrit ? 'bg-red-500' : pct > 65 ? 'bg-orange-500' : 'bg-emerald-500';
                return `
                    <div class="glass p-6 rounded-[2rem] transition-all duration-700 ${isCrit ? 'alert-pulse border-red-500' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <div><h6 class="font-black text-xl">${z} Zone</h6><p class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">Monitoring Sector</p></div>
                            <span class="text-xs font-black ${isCrit ? 'text-red-500' : 'text-slate-400'}">${Math.floor(pct)}%</span>
                        </div>
                        <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden mb-4">
                            <div class="progress-bar ${colorClass} h-full" style="width: ${pct}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-black tracking-widest text-slate-500 uppercase">
                            <span>Count: ${zones[z].occ}</span><span>Cap: ${zones[z].cap}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function triggerPA() {
            const btn = document.getElementById('broadcast-btn');
            const icon = document.getElementById('pa-icon');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-2xl"></i> BROADCASTING...';
            icon.classList.add('scale-125', 'bg-yellow-500/30');

            // Play Chime
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 587.33; // D5
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);

            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(ttsMsg);
                utterance.lang = currentLang === 'en' ? 'en-IN' : currentLang + '-IN';
                utterance.rate = 0.85;
                utterance.onend = () => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="ph-bold ph-broadcast text-2xl"></i> BROADCAST NOW';
                    icon.classList.remove('scale-125', 'bg-yellow-500/30');
                };
                window.speechSynthesis.speak(utterance);
            }, 1000);
        }
    </script>
</body>
</html>
